<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Red Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!--
    Ultraviolet: bundle defines the global `Ultraviolet` object,
    config uses it to set self.__uv$config.
    onerror: silently warns so the page doesn't hard-crash if UV files
    haven't been copied yet (run `npm run copy-uv` / `npm run build`).
  -->
  <script src="/uv/uv.bundle.js" onerror="console.warn('[Red Portal] UV bundle not found – run npm run copy-uv')"></script>
  <script src="/uv/uv.config.js" onerror="console.warn('[Red Portal] UV config not found – run npm run copy-uv')"></script>
</head>
<body>

  <!-- Ambient background effects -->
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <!-- Toast notification layer -->
  <div id="toastContainer"></div>

  <!-- ═══ HEADER ═══ -->
  <header>
    <div class="logo">
      <img
        src="https://i.imgur.com/YOUR_LOGO.png"
        alt="Red Portal"
        onerror="this.style.display='none'"
      />
      <span class="logo-text">RED<span>PORTAL</span></span>
    </div>

    <nav id="mainNav" aria-label="Main navigation">
      <a class="nav-link active" href="#" data-section="games">🎮 Games</a>
      <a class="nav-link" href="#" data-section="Testing">🧪 Testing</a>
      <a class="nav-link" href="#" data-section="proxies">🔓 Proxies</a>
      <a class="nav-link" href="#" data-section="executor">💻 Executor</a>
      <a class="nav-link" href="#" data-section="fetcher">🌐 Fetcher</a>
      <a class="nav-link" href="#" data-section="form">📋 Form</a>
      <a class="nav-link" href="#" data-section="credits">🏆 Credits</a>
    </nav>
  </header>

  <!-- ═══ MAIN ═══ -->
  <main>

    <!-- ─── Games ─── -->
    <section id="games" class="section active">
      <div class="section-header">
        <h2><span class="h2-icon">🎮</span> Games</h2>
        <div class="search-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="search" id="gameSearch" placeholder="Search games…" autocomplete="off" />
        </div>
      </div>
      <div class="games-grid" id="gamesGrid"></div>
    </section>

    <!-- ─── Testing ─── -->
    <section id="Testing" class="section">
      <div class="section-header">
        <h2><span class="h2-icon">🧪</span> Testing (Pre-Launch)</h2>
      </div>
      <div class="games-grid" id="preLaunchGrid"></div>
    </section>

    <!-- ─── Proxies ─── -->
    <section id="proxies" class="section">
      <div class="section-header">
        <h2><span class="h2-icon">🔓</span> Proxies</h2>
      </div>
      <div class="games-grid" id="proxiesGrid"></div>
    </section>

    <!-- ─── HTML Executor ─── -->
    <section id="executor" class="section">
      <h2 style="margin-bottom:1.25rem"><span class="h2-icon">💻</span> HTML Executor</h2>

      <div class="card">
        <label class="field-label" for="htmlInput">Type or paste HTML / JS / CSS</label>
        <textarea id="htmlInput" placeholder="<h1>Hello World!</h1>&#10;<script>alert('hi');<\/script>"></textarea>
        <button class="btn" id="btnRunHtml">▶ Run HTML</button>
        <p class="status" id="execTypedStatus"></p>
      </div>

      <div class="card">
        <label class="field-label" for="fileInput">Upload an HTML file</label>
        <input type="file" id="fileInput" accept=".html,.htm,.xhtml" />
        <button class="btn" id="btnOpenFile">📂 Open File</button>
        <p class="status" id="execFileStatus"></p>
      </div>
    </section>

    <!-- ─── Website Fetcher ─── -->
    <section id="fetcher" class="section">
      <h2 style="margin-bottom:1.25rem"><span class="h2-icon">🌐</span> Website Fetcher</h2>
      <div class="card">
        <label class="field-label" for="urlInput">Enter a URL to fetch &amp; open</label>
        <input type="url" id="urlInput" placeholder="https://example.com" />
        <button class="btn" id="btnFetchSite">🔗 Fetch &amp; Open</button>
        <p class="status" id="fetchStatus"></p>
      </div>
    </section>

    <!-- ─── Google Form ─── -->
    <section id="form" class="section">
      <h2 style="margin-bottom:1.25rem"><span class="h2-icon">📋</span> Google Form</h2>
      <div class="card">
        <button class="btn" id="btnOpenForm" style="margin-bottom:.25rem">
          🔗 Open Form in New Tab
        </button>
        <div class="iframe-wrap">
          <iframe
            src="https://docs.google.com/forms/d/e/1FAIpQLScaYcFE6kxkrrnx09OX8QLJZluyDLUeH65pDbRa-I2DapeQ7A/viewform?embedded=true"
            title="Google Form"
            loading="lazy">
            Loading…
          </iframe>
        </div>
      </div>
    </section>

    <!-- ─── Credits ─── -->
    <section id="credits" class="section">
      <h2 style="margin-bottom:1.25rem"><span class="h2-icon">🏆</span> Credits</h2>
      <div class="card credits-card">
        <div class="credit-item">
          <span class="credit-name">VVulture</span>
          <span class="credit-role">Coder, Designer &amp; Developer</span>
        </div>
        <div class="credit-item">
          <span class="credit-name">Redgale7</span>
          <span class="credit-role">Developer &amp; Contributor</span>
        </div>
        <div class="credit-item">
          <span class="credit-name">DeviDrawz</span>
          <span class="credit-role">Logo Designer</span>
        </div>
        <p class="credits-footer"><em>Hi Marcus!</em></p>
        <img
          src="https://www.icegif.com/wp-content/uploads/2023/02/icegif-519.gif"
          alt="credits gif"
        />
      </div>
    </section>

  </main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
